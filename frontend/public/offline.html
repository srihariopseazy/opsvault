<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OPSVAULT — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f9fafb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 1rem;
      padding: 2.5rem 2rem;
      text-align: center;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 1px 3px rgba(0,0,0,.05);
    }
    .icon {
      width: 56px; height: 56px;
      background: #eff6ff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
    }
    .icon svg { width: 28px; height: 28px; color: #2563eb; stroke: #2563eb; fill: none; }
    h1 { font-size: 1.25rem; font-weight: 700; color: #111827; margin-bottom: .5rem; }
    p { font-size: .9rem; color: #6b7280; line-height: 1.5; margin-bottom: 1.5rem; }
    button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: .5rem;
      padding: .625rem 1.25rem;
      font-size: .875rem;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
    }
    button:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18.364 5.636a9 9 0 010 12.728M15.536 8.464a5 5 0 010 7.072M12 12h.01M8.464 8.464a5 5 0 000 7.072M5.636 5.636a9 9 0 000 12.728"/>
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>No internet connection detected. Open the app while online to cache your vault for offline access.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
